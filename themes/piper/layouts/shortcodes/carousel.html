<div class="carousel-wrapper">
  <div class="carousel">
    {{ .Inner }}
  </div>
  <div class="button-wrapper">
    <button class="carousel-scroller prev" onclick="scrollCarousel(this, -1)"><--</button>
    <button class="carousel-scroller next" onclick="scrollCarousel(this, 1)">--></button>
  </div>
</div>
